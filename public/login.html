<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FiberFlow | Login</title>
    <script
      defer
      src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
      body {
        background: var(--bg);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      .login-card {
        width: 100%;
        max-width: 400px;
        padding: 2.5rem;
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-lg);
      }
      .login-header {
        text-align: center;
        margin-bottom: 2rem;
      }
      .login-header img {
        width: 50px;
        margin-bottom: 1rem;
      }
      .login-header h1 {
        font-size: 1.5rem;
        font-weight: 800;
        color: var(--dark);
      }
      .form-group {
        margin-bottom: 1.5rem;
      }
      .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 600;
        font-size: 0.9rem;
        color: var(--text);
      }
      .input-wrapper {
        position: relative;
      }
      .input-wrapper input {
        width: 100%;
        padding: 0.8rem 1rem;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        font-family: inherit;
        transition: var(--transition);
      }
      .input-wrapper input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 4px var(--primary-soft);
      }
      .toggle-password {
        position: absolute;
        right: 1rem;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        color: var(--muted);
        font-size: 1.2rem;
      }
      .btn-login {
        width: 100%;
        padding: 0.8rem;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: var(--radius-md);
        font-weight: 700;
        cursor: pointer;
        transition: var(--transition);
      }
      .btn-login:hover {
        background: #1d4ed8;
        transform: translateY(-2px);
      }
    </style>
  </head>
  <body x-data="loginApp()">
    <div class="login-card">
      <div class="login-header">
        <h1>FiberFlow</h1>
        <p style="color: var(--muted); font-size: 0.9rem">
          Manajemen ODP & Penarikan Kabel
        </p>
      </div>

      <form @submit.prevent="handleLogin">
        <div class="form-group">
          <label>Username</label>
          <div class="input-wrapper">
            <input
              type="text"
              x-model="username"
              placeholder="Masukkan username"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="input-wrapper">
            <input
              :type="showPassword ? 'text' : 'password'"
              x-model="password"
              placeholder="••••••••"
              required
            />
            <span class="toggle-password" @click="showPassword = !showPassword">
              <template x-if="!showPassword"><span>👁️</span></template>
              <template x-if="showPassword"><span>🕶️</span></template>
            </span>
          </div>
        </div>

        <button type="submit" class="btn-login" :disabled="loading">
          <span x-show="!loading">Masuk</span>
          <span x-show="loading">Memproses...</span>
        </button>
      </form>
    </div>

    <script>
      function loginApp() {
        return {
          username: "",
          password: "",
          showPassword: false,
          loading: false,

          async handleLogin() {
            if (!this.username || !this.password) {
              return Swal.fire({
                icon: "warning",
                title: "Peringatan",
                text: "Username dan password wajib diisi",
                background: "#1e293b",
                color: "#f8fafc",
              });
            }

            this.loading = true;
            try {
              const response = await fetch("/api/login", {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                },
                body: JSON.stringify({
                  username: this.username,
                  password: this.password,
                }),
              });

              const result = await response.json();

              if (response.ok) {
                // 1. Simpan Token JWT untuk autentikasi API
                localStorage.setItem("token", result.token);

                // 2. Simpan Username (untuk pengecekan akun 'admin')
                localStorage.setItem("username", this.username);

                // 3. Simpan Objek User (untuk pengecekan role 'full'/'read')
                // Pastikan API server Anda mengirimkan data result.user.nama dan result.user.role
                localStorage.setItem(
                  "user",
                  JSON.stringify({
                    nama: result.user.nama,
                    role: result.user.role,
                  }),
                );

                // Notifikasi sukses menggunakan Toast
                const Toast = Swal.mixin({
                  toast: true,
                  position: "top-end",
                  showConfirmButton: false,
                  timer: 1000,
                  background: "#1e293b",
                  color: "#f8fafc",
                });

                await Toast.fire({
                  icon: "success",
                  title: "Login Berhasil",
                });

                // Redirect ke halaman utama
                window.location.href = "index.html";
              } else {
                // Pesan kesalahan jika login gagal (invalid credentials)
                Swal.fire({
                  icon: "error",
                  title: "Gagal Login",
                  text: result.message || "Username atau password salah",
                  background: "#1e293b",
                  color: "#f8fafc",
                  confirmButtonColor: "#3b82f6",
                });
              }
            } catch (error) {
              console.error("Login error:", error);
              Swal.fire({
                icon: "error",
                title: "Error",
                text: "Tidak dapat terhubung ke server. Pastikan API server sudah berjalan.",
                background: "#1e293b",
                color: "#f8fafc",
              });
            } finally {
              this.loading = false;
            }
          },
        };
      }
    </script>
  </body>
</html>
