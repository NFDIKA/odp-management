<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FiberFlow | Login</title>
    <script
      defer
      src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
      body {
        background: var(--bg);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh; /* Ubah height menjadi min-height */
        margin: 0;
        overflow: hidden; /* Tambahkan ini jika ingin tetap terkunci */
      }

      /* Tambahkan ini untuk mencegah pergerakan saat Swal aktif */
      body.swal2-shown {
        height: 100vh !important;
      }

      .login-card {
        width: 100%;
        max-width: 400px;
        padding: 2.5rem;
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-lg);
      }

      .login-header {
        text-align: center;
        margin-bottom: 2rem;
      }

      .login-header img {
        width: 50px;
        margin-bottom: 1rem;
      }

      .login-header h1 {
        font-size: 1.5rem;
        font-weight: 800;
        color: var(--dark);
      }

      .form-group {
        margin-bottom: 1.5rem;
      }

      .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 600;
        font-size: 0.9rem;
        color: var(--text);
      }

      .input-wrapper {
        position: relative;
        width: 100%;
      }

      .input-wrapper input {
        width: 100%;
        padding: 12px 16px;
        padding-right: 45px; /* Ruang untuk icon eye */
        border-radius: var(--radius-md, 12px);
        border: 1px solid var(--border);
        background: white;
        color: var(--dark, #0f172a);
        font-family: inherit;
        transition: var(--transition);
      }

      .input-wrapper input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 4px var(--primary-soft);
      }

      /* Styling untuk tombol toggle password (SVG) */
      .toggle-password {
        position: absolute;
        right: 1rem;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        background: none;
        border: none;
        padding: 0;
        display: flex;
        align-items: center;
        color: var(--muted);
        transition: var(--transition);
      }

      .toggle-password:hover {
        color: var(--primary) !important;
        opacity: 0.8;
      }

      .toggle-password:focus {
        outline: none;
      }

      .btn-login {
        width: 100%;
        padding: 0.8rem;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: var(--radius-md);
        font-weight: 700;
        cursor: pointer;
        transition: var(--transition);
      }

      .btn-login:hover {
        background: #1d4ed8;
        transform: translateY(-2px);
      }

      .btn-login:disabled {
        opacity: 0.7;
        cursor: not-allowed;
        transform: none;
      }
    </style>
  </head>
  <body x-data="loginApp()">
    <div class="login-card">
      <div class="login-header">
        <h1>FiberFlow</h1>
        <p style="color: var(--muted); font-size: 0.9rem">
          Manajemen ODP & Penarikan Kabel
        </p>
      </div>

      <form @submit.prevent="handleLogin">
        <div class="form-group">
          <label>Username</label>
          <div class="input-wrapper">
            <input
              type="text"
              x-model="username"
              placeholder="Masukkan username"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="input-wrapper" style="position: relative">
            <input
              :type="showPassword ? 'text' : 'password'"
              x-model="password"
              placeholder="Masukkan Password"
              style="padding-right: 45px"
              required
            />
            <button
              type="button"
              @click="showPassword = !showPassword"
              style="
                position: absolute;
                right: 12px;
                top: 50%;
                transform: translateY(-50%);
                background: none;
                border: none;
                cursor: pointer;
                color: #64748b;
                display: flex;
                align-items: center;
              "
            >
              <svg
                x-show="!showPassword"
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>

              <svg
                x-show="showPassword"
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                style="display: none"
              >
                <path
                  d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"
                ></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-login" :disabled="loading">
          <span x-show="!loading">Masuk</span>
          <span x-show="loading">Memproses...</span>
        </button>
      </form>
    </div>

    <script>
      function loginApp() {
        return {
          username: "",
          password: "",
          showPassword: false,
          loading: false,

          async handleLogin() {
            if (!this.username || !this.password) {
              return Swal.fire({
                icon: "warning",
                title: "Peringatan",
                text: "Username dan password wajib diisi",
                background: "#1e293b",
                color: "#f8fafc",
              });
            }

            this.loading = true;
            try {
              const response = await fetch("/api/login", {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                },
                body: JSON.stringify({
                  username: this.username,
                  password: this.password,
                }),
              });

              const result = await response.json();

              if (response.ok) {
                localStorage.setItem("token", result.token);
                localStorage.setItem("username", this.username);

                // Perbaikan: Ambil data nama/role dari result.user atau result saja (tergantung API)
                // Gunakan logical OR (||) untuk mencegah nilai undefined
                const userData = {
                  nama: result.user?.nama || result.nama || "User",
                  role: result.user?.role || "read",
                };

                localStorage.setItem("user", JSON.stringify(userData));

                // Notifikasi sukses menggunakan Toast
                const Toast = Swal.mixin({
                  toast: true,
                  position: "top-end",
                  showConfirmButton: false,
                  timer: 1000,
                  background: "#1e293b",
                  color: "#f8fafc",
                });

                await Toast.fire({
                  icon: "success",
                  title: "Login Berhasil",
                });

                // Redirect ke halaman utama
                window.location.href = "index.html";
              } else {
                // Pesan kesalahan jika login gagal (invalid credentials)
                Swal.fire({
                  icon: "error",
                  title: "Gagal Login",
                  text: result.message || "Username atau password salah",
                  background: "#1e293b",
                  color: "#f8fafc",
                  confirmButtonColor: "#3b82f6",
                });
              }
            } catch (error) {
              console.error("Login error:", error);
              Swal.fire({
                icon: "error",
                title: "Error",
                text: "Tidak dapat terhubung ke server. Pastikan API server sudah berjalan.",
                background: "#1e293b",
                color: "#f8fafc",
              });
            } finally {
              this.loading = false;
            }
          },
        };
      }
    </script>
  </body>
</html>
