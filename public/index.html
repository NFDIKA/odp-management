<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FiberFlow | ODP Dashboard</title>
    <script
      defer
      src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-bootstrap-4/bootstrap-4.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="script.js"></script>
  </head>
  <body x-data="odpApp()" x-init="fetchData()">
    <nav class="glass-nav">
      <div style="display: flex; align-items: center; gap: 1rem">
        <div
          style="
            background: var(--primary);
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
          "
        >
          <svg
            width="22"
            height="22"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
          </svg>
        </div>
        <h1 style="font-size: 1.2rem; margin: 0; font-weight: 900">
          FiberFlow
        </h1>
      </div>
      <div style="display: flex; gap: 0.5rem; margin-bottom: 1rem">
        <button
          @click="cabutModal = true"
          class="btn btn-cabut"
          style="
            font-weight: 800;
            padding: 0.6rem 1.2rem;
            border-radius: 0.8rem;
          "
        >
          🛑 FORM CABUT
        </button>

        <button
          @click="openModal()"
          class="btn btn-primary"
          style="
            font-weight: 800;
            padding: 0.6rem 1.2rem;
            border-radius: 0.8rem;
          "
        >
          ➕ NEW ODP
        </button>
      </div>
    </nav>

    <div class="main-container">
      <div
        style="
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
          gap: 15px;
          margin-bottom: 20px;
        "
      >
        <div
          @click="filterStatus = ''; filterArea = ''; filterCluster = ''; filterKota = ''; searchQuery = ''"
          style="
            background: white;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            transition: 0.3s;
          "
          onmouseover="this.style.boxShadow = '0 4px 12px rgba(0,0,0,0.1)'"
          onmouseout="this.style.boxShadow = 'none'"
        >
          <div style="font-size: 0.8rem; color: #64748b; font-weight: 600">
            TOTAL ODP
          </div>
          <div
            style="font-size: 1.5rem; font-weight: 800; color: #1e293b"
            x-text="odps.length"
          ></div>
        </div>

        <div
          @click="filterStatus = 'Available'"
          style="
            background: white;
            padding: 15px;
            border-radius: 12px;
            border-left: 5px solid #22c55e;
            cursor: pointer;
            transition: 0.3s;
          "
          onmouseover="this.style.boxShadow = '0 4px 12px rgba(0,0,0,0.1)'"
          onmouseout="this.style.boxShadow = 'none'"
        >
          <div style="font-size: 0.8rem; color: #22c55e; font-weight: 600">
            AVAILABLE
          </div>
          <div
            style="font-size: 1.5rem; font-weight: 800; color: #1e293b"
            x-text="odps.filter(o => getUtilization(o) < 75).length"
          ></div>
        </div>

        <div
          @click="filterStatus = 'Critical'"
          style="
            background: white;
            padding: 15px;
            border-radius: 12px;
            border-left: 5px solid #eab308;
            cursor: pointer;
            transition: 0.3s;
          "
          onmouseover="this.style.boxShadow = '0 4px 12px rgba(0,0,0,0.1)'"
          onmouseout="this.style.boxShadow = 'none'"
        >
          <div style="font-size: 0.8rem; color: #eab308; font-weight: 600">
            CRITICAL (>=75%)
          </div>
          <div
            style="font-size: 1.5rem; font-weight: 800; color: #1e293b"
            x-text="odps.filter(o => getUtilization(o) >= 75 && getUtilization(o) < 100).length"
          ></div>
        </div>

        <div
          @click="filterStatus = 'Full'"
          style="
            background: white;
            padding: 15px;
            border-radius: 12px;
            border-left: 5px solid #ef4444;
            cursor: pointer;
            transition: 0.3s;
          "
          onmouseover="this.style.boxShadow = '0 4px 12px rgba(0,0,0,0.1)'"
          onmouseout="this.style.boxShadow = 'none'"
        >
          <div style="font-size: 0.8rem; color: #ef4444; font-weight: 600">
            FULL (100%)
          </div>
          <div
            style="font-size: 1.5rem; font-weight: 800; color: #1e293b"
            x-text="odps.filter(o => getUtilization(o) === 100).length"
          ></div>
        </div>
      </div>

      <div
        style="
          background: #f8fafc;
          padding: 15px;
          border-radius: 12px;
          border: 1px solid #e2e8f0;
          margin-bottom: 1.5rem;
        "
      >
        <div
          style="
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
            margin-bottom: 1rem;
          "
        >
          <button
            @click="exportToExcel()"
            class="btn btn-excel"
            title="Download data ke Excel"
          >
            Export XLSX
          </button>
          <button
            @click="downloadTemplate()"
            class="btn btn-excel"
            style="background: #252b34; cursor: pointer"
            title="Download Template Excel"
          >
            Download Template
          </button>
          <label
            class="btn btn-excel"
            style="background: #2b5797; cursor: pointer"
            title="Upload data dari Excel"
          >
            Import XLSX
            <input
              type="file"
              @change="importFromExcel($event)"
              style="display: none"
              accept=".xlsx, .xls"
            />
          </label>
        </div>

        <div
          style="
            display: flex;
            gap: 1rem;
            align-items: flex-end;
            flex-wrap: wrap;
          "
        >
          <div style="flex: 2; min-width: 250px">
            <label
              style="
                font-size: 0.65rem;
                font-weight: 800;
                color: #64748b;
                display: block;
                margin-bottom: 5px;
              "
              >SEARCH</label
            >
            <input
              type="text"
              x-model="searchQuery"
              placeholder="Cari Nama ODP atau Nojar..."
            />
          </div>

          <div style="flex: 1; min-width: 140px">
            <label
              style="
                font-size: 0.65rem;
                font-weight: 800;
                color: #64748b;
                display: block;
                margin-bottom: 5px;
              "
              >FILTER AREA</label
            >
            <select x-model="filterArea" @change="filterCluster = ''">
              <option value="">Semua Area</option>
              <template
                x-for="area in [...new Set(odps.map(o => o.area))].filter(a => a)"
                :key="area"
              >
                <option :value="area" x-text="area"></option>
              </template>
            </select>
          </div>

          <div style="flex: 1; min-width: 140px">
            <label
              style="
                font-size: 0.65rem;
                font-weight: 800;
                color: #64748b;
                display: block;
                margin-bottom: 5px;
              "
              >FILTER CLUSTER</label
            >
            <select x-model="filterCluster">
              <option value="">Semua Cluster</option>
              <template
                x-for="cluster in [...new Set(odps.filter(o => !filterArea || o.area === filterArea).map(o => o.cluster))].filter(c => c)"
                :key="cluster"
              >
                <option :value="cluster" x-text="cluster"></option>
              </template>
            </select>
          </div>

          <div style="flex: 1; min-width: 140px">
            <label
              style="
                font-size: 0.65rem;
                font-weight: 800;
                color: #64748b;
                display: block;
                margin-bottom: 5px;
              "
              >STATUS ODP</label
            >
            <select x-model="filterStatus">
              <option value="">Semua Status</option>
              <option value="Available">Available (< 75%)</option>
              <option value="Critical">Critical (≥ 75%)</option>
              <option value="Full">Full (100%)</option>
            </select>
          </div>

          <div style="flex: 1; min-width: 140px">
            <label
              style="
                font-size: 0.65rem;
                font-weight: 800;
                color: #64748b;
                display: block;
                margin-bottom: 5px;
              "
              >FILTER KOTA</label
            >
            <select x-model="filterKota">
              <option value="">Semua Kota</option>
              <template
                x-for="city in [...new Set(odps.filter(o => !filterCluster || o.cluster === filterCluster).map(o => o.kota))].filter(c => c)"
                :key="city"
              >
                <option :value="city" x-text="city"></option>
              </template>
            </select>
          </div>
        </div>
      </div>

      <div class="odp-card">
        <table class="odp-table">
          <thead>
            <tr>
              <th>Identity</th>
              <th>Area / Cluster</th>
              <th style="text-align: center">In Status</th>
              <th style="text-align: center">Out Status</th>
              <th style="text-align: right">Action</th>
            </tr>
          </thead>
          <tbody>
            <template x-for="item in filteredOdps" :key="item.id">
              <tr
                :class="getStatusClass(item)"
                style="border-bottom: 1px solid #f1f5f9"
              >
                <td>
                  <div
                    style="font-weight: 800; font-size: 1rem"
                    x-text="item.nama"
                  ></div>

                  <div
                    style="
                      display: flex;
                      align-items: center;
                      gap: 5px;
                      margin-top: 4px;
                    "
                  >
                    <span
                      style="
                        color: var(--primary);
                        font-size: 0.7rem;
                        font-weight: 700;
                      "
                      x-text="item.level"
                    ></span>
                    <span
                      :class="{
            'badge badge-green': getUtilization(item) < 75,
            'badge badge-yellow': getUtilization(item) >= 75 && getUtilization(item) < 100,
            'badge badge-red': getUtilization(item) === 100
          }"
                      x-text="getUtilization(item) === 100 ? 'FULL' : (getUtilization(item) >= 75 ? 'CRITICAL' : 'AVAILABLE')"
                    ></span>
                  </div>
                  <template x-if="isNojarMatch(item)">
                    <div
                      style="
                        margin-top: 5px;
                        font-size: 10px;
                        color: #d97706;
                        font-weight: bold;
                      "
                    >
                      🔍 Nojar ditemukan di Port
                      <span x-text="isNojarMatch(item)"></span>
                    </div>
                  </template>
                </td>

                <td>
                  <div
                    style="font-weight: 700; color: #1e293b"
                    x-text="item.area"
                  ></div>
                  <div
                    style="
                      font-size: 0.7rem;
                      color: #94a3b8;
                      text-transform: uppercase;
                      font-weight: 600;
                    "
                    x-text="item.cluster + ' / ' + (item.kota || '-')"
                  ></div>
                </td>

                <td style="text-align: center">
                  <div style="display: flex; justify-content: center; gap: 2px">
                    <div
                      class="indicator-dot"
                      :class="item.in1 ? 'dot-active' : 'dot-empty'"
                    ></div>
                    <div
                      class="indicator-dot"
                      :class="item.in2 ? 'dot-active' : 'dot-empty'"
                    ></div>
                  </div>
                  <div
                    style="font-size: 0.6rem; color: #94a3b8; margin-top: 4px"
                  >
                    IN
                  </div>
                </td>

                <td style="text-align: center">
                  <div style="display: flex; justify-content: center; gap: 1px">
                    <template x-for="i in 8">
                      <div
                        class="indicator-dot"
                        :class="item['out'+i] ? 'dot-active' : 'dot-empty'"
                      ></div>
                    </template>
                  </div>
                  <div
                    style="font-size: 0.6rem; color: #94a3b8; margin-top: 4px"
                  >
                    <span x-text="getUtilization(item)"></span>% Filled
                  </div>
                </td>

                <td style="text-align: right; white-space: nowrap">
                  <button
                    @click="openInMaps(item.latlong)"
                    class="btn-action btn-view"
                    style="color: #13be21"
                  >
                    📍 MAP
                  </button>
                  <button @click="viewData(item)" class="btn-action btn-view">
                    VIEW
                  </button>
                  <button @click="editOdp(item)" class="btn-action btn-edit">
                    EDIT
                  </button>
                  <button
                    @click="deleteOdp(item.id)"
                    class="btn-action btn-delete"
                  >
                    DEL
                  </button>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </div>

    <div x-show="modalOpen" x-cloak class="modal-overlay">
      <div class="modal-content">
        <div
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
          "
        >
          <h2
            style="margin: 0; font-weight: 900"
            x-text="isEdit ? 'UPDATE ODP' : 'SUBMIT NEW ODP'"
          ></h2>
          <button
            @click="modalOpen = false"
            style="
              background: none;
              border: none;
              font-size: 2rem;
              cursor: pointer;
              color: #cbd5e1;
            "
          >
            &times;
          </button>
        </div>

        <form @submit.prevent="saveData">
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem">
            <div style="grid-column: span 2" class="form-group">
              <label>NAMA ODP</label>
              <input
                type="text"
                x-model="form.nama"
                @input="formatInput('nama')"
                required
                placeholder="Contoh: ODP-BPN-01"
              />
            </div>

            <div style="grid-column: span 2" class="form-group">
              <label>KOTA</label>
              <input
                type="text"
                x-model="form.kota"
                @input="formatInput('kota')"
                placeholder="Contoh: BALIKPAPAN"
              />
            </div>
            <div class="form-group">
              <label>LEVEL</label>
              <select x-model="form.level">
                <option value="Level 1">Level 1</option>
                <option value="Level 2">Level 2</option>
              </select>
            </div>
            <div class="form-group">
              <label>LATLONG</label>
              <input
                type="text"
                x-model="form.latlong"
                @input="formatInput('latlong')"
                placeholder="-1.23, 116.45"
              />
            </div>
            <div class="form-group">
              <label>AREA</label>
              <select x-model="form.area" @change="form.cluster = ''">
                <option value="">Pilih Area</option>
                <option value="EKO">EKO</option>
                <option value="WKO">WKO</option>
              </select>
            </div>
            <div class="form-group">
              <label>CLUSTER</label>
              <select x-model="form.cluster">
                <option value="">Pilih Cluster</option>
                <template x-if="form.area === 'EKO'">
                  <template
                    x-for="c in ['TANJUNG SELOR', 'BALIKPAPAN', 'SAMARINDA', 'BANJARMASIN']"
                  >
                    <option :value="c" x-text="c"></option>
                  </template>
                </template>
                <template x-if="form.area === 'WKO'">
                  <template x-for="c in ['PONTIANAK', 'PALANGKARAYA']">
                    <option :value="c" x-text="c"></option>
                  </template>
                </template>
              </select>
            </div>
          </div>

          <div class="tech-section">
            <h3>Port Assignment (In & Out)</h3>
            <div
              style="
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 0.5rem;
                margin-bottom: 1rem;
              "
            >
              <input
                type="text"
                class="dark-input"
                placeholder="Input 1"
                x-model="form.in1"
                @input="formatInput('in1')"
              />
              <input
                type="text"
                class="dark-input"
                placeholder="Input 2"
                x-model="form.in2"
                @input="formatInput('in2')"
              />
            </div>
            <div
              style="
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 0.5rem;
              "
            >
              <template x-for="i in 8">
                <input
                  type="text"
                  class="dark-input"
                  :placeholder="'Port '+i"
                  x-model="form['out'+i]"
                  @input="formatInput('out'+i)"
                />
              </template>
            </div>
          </div>

          <button
            type="submit"
            style="
              width: 100%;
              background: var(--primary);
              color: white;
              border: none;
              padding: 1.2rem;
              border-radius: 1rem;
              font-weight: 900;
              margin-top: 1.5rem;
              cursor: pointer;
            "
          >
            SIMPAN PERUBAHAN
          </button>
        </form>
      </div>
    </div>

    <div x-show="cabutModal" x-cloak class="modal-overlay">
      <div class="modal-content" style="max-width: 450px">
        <h2
          style="margin: 0 0 1.5rem 0; font-weight: 900; color: var(--danger)"
        >
          FORM CABUT LAYANAN
        </h2>
        <div class="form-group">
          <label>MASUKKAN NOJAR / NAMA PELANGGAN</label>
          <input
            type="text"
            x-model="nojarCabut"
            placeholder="Contoh: 2020554433"
          />
        </div>

        <div style="display: flex; gap: 10px; margin-top: 1.5rem">
          <button
            @click="cabutModal = false"
            class="btn"
            style="background: #f1f5f9; flex: 1"
          >
            BATAL
          </button>
          <button
            @click="findAndConfirmCabut()"
            class="btn"
            style="background: var(--danger); color: white; flex: 2"
          >
            PROSES CABUT
          </button>
        </div>
      </div>
    </div>

    <div x-show="viewOpen" x-cloak class="modal-overlay">
      <div class="modal-content" style="max-width: 450px">
        <div style="text-align: center; margin-bottom: 1.5rem">
          <h2
            style="font-weight: 900; margin-bottom: 5px"
            x-text="viewItem.nama"
          ></h2>
          <span
            style="
              background: #eff6ff;
              color: var(--primary);
              padding: 0.4rem 1rem;
              border-radius: 2rem;
              font-size: 0.75rem;
              font-weight: 900;
            "
            x-text="viewItem.level"
          ></span>
        </div>
        <div
          style="
            background: #f8fafc;
            padding: 1.5rem;
            border-radius: 1.25rem;
            font-size: 0.85rem;
            border: 1px solid #e2e8f0;
          "
        >
          <div style="margin-bottom: 10px">
            <b>Area:</b> <span x-text="viewItem.area || '-'"></span>
          </div>
          <div style="margin-bottom: 10px">
            <b>Cluster:</b> <span x-text="viewItem.cluster || '-'"></span>
          </div>
          <div style="margin-bottom: 10px">
            <b>Latlong:</b> <span x-text="viewItem.latlong || '-'"></span>
          </div>
          <hr
            style="border: 0; border-top: 1px solid #e2e8f0; margin: 15px 0"
          />
          <div style="margin-bottom: 5px">
            <b>In 1:</b> <span x-text="viewItem.in1 || '-'"></span>
          </div>
          <div style="margin-bottom: 15px">
            <b>In 2:</b> <span x-text="viewItem.in2 || '-'"></span>
          </div>
          <b>Out Ports:</b>
          <div
            style="
              display: grid;
              grid-template-columns: 1fr 1fr;
              gap: 8px;
              margin-top: 8px;
            "
          >
            <template x-for="i in 8">
              <div
                style="
                  background: white;
                  padding: 5px 10px;
                  border-radius: 0.5rem;
                  border: 1px solid #e2e8f0;
                "
              >
                P<span x-text="i"></span>:
                <span
                  x-text="viewItem['out'+i] || '-'"
                  style="font-weight: bold; color: var(--primary)"
                ></span>
              </div>
            </template>
            <div class="mt-4">
              <label
                class="block text-gray-500 text-[10px] font-bold mb-2 uppercase"
                ><b>Status Port Output</b></label
              >
              <div class="port-grid">
                <template x-for="i in 8" :key="i">
                  <div
                    :class="viewItem['out' + i] ? 'port-item bg-occupied' : 'port-item bg-available'"
                  >
                    <div style="opacity: 0.7">P-<span x-text="i"></span></div>
                    <div x-text="viewItem['out' + i] ? 'FILL' : 'EMPTY'"></div>
                  </div>
                </template>
              </div>
            </div>
          </div>
        </div>
        <button
          @click="viewOpen = false"
          style="
            width: 100%;
            background: #f1f5f9;
            color: #475569;
            border: none;
            padding: 1rem;
            border-radius: 1rem;
            font-weight: 800;
            margin-top: 1.5rem;
            cursor: pointer;
          "
        >
          TUTUP
        </button>
      </div>
    </div>
  </body>
</html>
